name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  shared:
    name: Shared — Build & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shared/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: TypeScript type-check
        run: npx tsc --noEmit

  backend:
    name: Backend — Lint, Type-check, Test, Build
    runs-on: ubuntu-latest
    needs: shared
    defaults:
      run:
        working-directory: backend
    services:
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test -- --coverage
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: coels_crms_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret_at_least_64_characters_long_for_ci_pipeline_security_ok
          JWT_REFRESH_SECRET: test_refresh_secret_at_least_64_characters_long_for_ci_pipeline_ok

      - name: Build
        run: npm run build

      - name: Build Docker image (backend)
        run: docker build -f Dockerfile -t coels-crms-backend:${{ github.sha }} .

  frontend:
    name: Frontend — Lint, Type-check, Build
    runs-on: ubuntu-latest
    needs: shared
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Build Docker image (frontend)
        run: docker build -f Dockerfile -t coels-crms-frontend:${{ github.sha }} .

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "Deployment to production would happen here"
